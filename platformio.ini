; ─── Shared base configurations ──────────────────────────────────────────────
; Inherit with: extends = esp32_base  (or nrf52_base)
; Override individual keys in the [env:*] section as needed.

[esp32_base]
platform  = espressif32
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
build_unflags = -std=gnu++11
; main_nrf.cpp is the nRF52 entry point — exclude it from all ESP32 builds.
build_src_filter = +<*> -<main_nrf.cpp>
lib_deps =
    fastled/FastLED@3.9.7
    bblanchon/ArduinoJson
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    https://github.com/me-no-dev/AsyncTCP.git
    links2004/WebSockets@^2.6.1
    WiFi
    WiFiClientSecure
build_flags =
    -std=gnu++17
    -D CORE_DEBUG_LEVEL=5
    -D CONFIG_ASYNC_TCP_RUNNING_CORE=0
    -D WEBSOCKET_MAX_QUEUED_MESSAGES=32
    -D ASYNCWEBSERVER_REGEX=0
    ; OTA tunables — override in a per-board [env:*] section if needed.
    -D OTA_USERNAME=\"admin\"
    -D OTA_NVS_NAMESPACE=\"ota\"
    -D OTA_NVS_PWD_KEY=\"password\"
    -D OTA_DEFAULT_PASSWORD=\"admin\"
    -D OTA_MIN_PASSWORD_LEN=8

[nrf52_base]
platform  = nordicnrf52
framework = arduino
monitor_speed = 115200
lib_deps =
    bblanchon/ArduinoJson
; Exclude WiFi/LittleFS-dependent sources; main_nrf.cpp is the entry point instead.
build_src_filter =
    +<*>
    -<main.cpp>
    -<NetworkManager.cpp>
    -<DiscoveryManager.cpp>
    -<MCPServer.cpp>
    -<uLogger.cpp>
    -<MetricsSystem.cpp>
    -<BusHistory.cpp>
    -<OTAManager.cpp>
    +<main_nrf.cpp>
build_unflags = -std=gnu++11
build_flags =
    -std=gnu++17
    -D MCP_NO_THREADS

; ─── ESP32 targets (full MCP server: WebSocket + mDNS + UDP discovery) ────────

[env:esp32-s3-devkitc-1]
extends = esp32_base
board   = esp32-s3-devkitc-1
build_flags =
    ${esp32_base.build_flags}
    -D BOARD_ESP32_S3_DEVKITC1

[env:esp32-devkitc]
extends = esp32_base
board   = esp32dev
build_flags =
    ${esp32_base.build_flags}
    -D BOARD_ESP32_DEVKITC

[env:esp32-c3-devkitm-1]
extends = esp32_base
board   = esp32-c3-devkitm-1
build_flags =
    ${esp32_base.build_flags}
    -D BOARD_ESP32_C3_DEVKITM1

[env:adafruit-huzzah32]
extends = esp32_base
board   = featheresp32
build_flags =
    ${esp32_base.build_flags}
    -D BOARD_ADAFRUIT_HUZZAH32

[env:m5stack-core]
extends = esp32_base
board   = m5stack-core-esp32
build_flags =
    ${esp32_base.build_flags}
    -D BOARD_M5STACK_CORE

; ─── nRF52840 targets (sensor acquisition only; no WiFi) ─────────────────────

[env:nrf52840-dk]
extends = nrf52_base
board   = nrf52840_dk
build_flags =
    ${nrf52_base.build_flags}
    -D BOARD_NRF52840_DK

[env:nrf52840-feather]
extends = nrf52_base
board   = adafruit_feather_nrf52840
build_flags =
    ${nrf52_base.build_flags}
    -D BOARD_NRF52840_FEATHER

; ─── Native unit tests (no hardware) ─────────────────────────────────────────

[env:native]
platform = native
lib_deps =
    throwtheswitch/Unity@^2.5.2
    bblanchon/ArduinoJson
test_build_src = yes
; Exclude main.cpp, main_nrf.cpp and ESP32-only modules from native test builds.
build_src_filter =
    +<*>
    -<main.cpp>
    -<main_nrf.cpp>
    -<OTAManager.cpp>
build_flags =
    -std=gnu++17
    -D UNITY_INCLUDE_CONFIG_H
    -D NATIVE_TEST
    -I $PROJECT_DIR/test/stubs
    -I $PROJECT_DIR/test
